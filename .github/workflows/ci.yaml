name: Elixir CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

env:
  ELIXIR_VERSION: '1.19.5'
  OTP_VERSION: '28.3.1'

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6.0.3
    - name: Set up Elixir
      uses: erlef/setup-beam@v1.24.0
      with:
        elixir-version: ${{ env.ELIXIR_VERSION }}
        otp-version: ${{ env.OTP_VERSION }}
    - name: Restore dependencies cache
      uses: actions/cache@v3
      with:
        path: deps
        key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
        restore-keys: ${{ runner.os }}-mix-
    - name: Install dependencies
      run: mix deps.get
    - name: Compile with warnings as errors
      run: MIX_ENV=test mix compile --warnings-as-errors
    - name: Cache build artifacts
      uses: actions/cache@v3
      with:
        path: |
          _build
          deps
        key: ${{ runner.os }}-build-${{ hashFiles('**/mix.lock') }}-${{ github.sha }}

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    services:
      db:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: task_master_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
    - uses: actions/checkout@v6.0.3
    - name: Set up Elixir
      uses: erlef/setup-beam@v1.24.0
      with:
        elixir-version: ${{ env.ELIXIR_VERSION }}
        otp-version: ${{ env.OTP_VERSION }}
    - name: Restore build artifacts
      uses: actions/cache@v3
      with:
        path: |
          _build
          deps
        key: ${{ runner.os }}-build${{ hashFiles('**/mix.lock') }}-${{ github.sha }}
    - name: Run tests
      run: mix test

  credo:
    name: Credo
    runs-on: ubuntu-latest
    needs: build
    steps:
    - uses: actions/checkout@v6.0.3
    - name: Set up Elixir
      uses: erlef/setup-beam@v1.24.0
      with:
        elixir-version: ${{ env.ELIXIR_VERSION }}
        otp-version: ${{ env.OTP_VERSION }}
    - name: Restore build artifacts
      uses: actions/cache@v3
      with:
        path: |
          _build
          deps
        key: ${{ runner.os }}-build-${{ hashFiles('**/mix.lock') }}-${{ github.sha }}
    - name: Run Credo
      run: mix credo --strict

  format:
    name: Format
    runs-on: ubuntu-latest
    needs: build
    steps:
    - uses: actions/checkout@v6.0.3
    - name: Set up Elixir
      uses: erlef/setup-beam@v1.24.0
      with:
        elixir-version: ${{ env.ELIXIR_VERSION }}
        otp-version: ${{ env.OTP_VERSION }}
    - name: Restore build artifacts
      uses: actions/cache@v3
      with:
        path: |
          _build
          deps
        key: ${{ runner.os }}-build-${{ hashFiles('**/mix.lock') }}-${{ github.sha }}
    - name: Check formatting
      run: mix format --check-formatted

  sobelow:
    name: Sobelow
    runs-on: ubuntu-latest
    needs: build
    steps:
    - uses: actions/checkout@v6.0.3
    - name: Set up Elixir
      uses: erlef/setup-beam@v1.24.0
      with: 
        elixir-version: ${{ env.ELIXIR_VERSION }}
        otp-version: ${{ env.OTP_VERSION }}
    - name: Restore build artifacts
      uses: actions/cache@v3
      with:
        path: |
          _build
          deps
        key: ${{ runner.os }}-build-${{ hashFiles('**/mix.lock') }}-${{ github.sha }}
    - name: Run Sobelow
      run: mix sobelow --skip
